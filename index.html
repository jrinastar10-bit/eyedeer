<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>✨ 별자리 운세</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07050f;
    --surface: #120d22;
    --card: #1c1435;
    --border: rgba(180,140,255,0.15);
    --gold: #f0c96e;
    --lavender: #c4a4ff;
    --glow: #7c3aed;
    --text: #e2d9f3;
    --muted: #8b7faa;
    --accent: #ff9fd0;
  }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .page { position: relative; z-index: 1; }
  .lock-screen { position: fixed; inset: 0; z-index: 50; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 32px; }
  .lock-screen.active { display: flex; }
  .lock-icon { font-size: 52px; margin-bottom: 24px; animation: lockPulse 2.5s ease-in-out infinite; }
  @keyframes lockPulse { 0%,100% { opacity:.6; transform:scale(1); } 50% { opacity:1; transform:scale(1.06); } }
  .lock-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; color: var(--lavender); margin-bottom: 12px; }
  .lock-desc { font-size: 13px; line-height: 1.9; color: var(--muted); }
  .lock-desc em { font-style: normal; color: var(--gold); }
  .lock-ornament { margin-top: 28px; font-size: 14px; color: var(--lavender); opacity: .3; letter-spacing: .5em; }
  .hero { text-align: center; padding: 56px 24px 32px; }
  .hero-eyebrow { font-size: 11px; letter-spacing: .25em; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
  .hero-title { font-family: 'Noto Serif KR', serif; font-size: clamp(28px, 8vw, 42px); font-weight: 700; line-height: 1.25; background: linear-gradient(135deg, var(--gold) 0%, var(--lavender) 60%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; }
  .hero-date { font-size: 13px; color: var(--muted); letter-spacing: .05em; }
  .divider { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--lavender), transparent); margin: 24px auto; }
  .section-label { text-align: center; font-size: 11px; letter-spacing: .2em; color: var(--muted); margin-bottom: 18px; text-transform: uppercase; }
  .zodiac-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 16px; max-width: 420px; margin: 0 auto; }
  .zcard { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 6px 10px; text-align: center; cursor: pointer; transition: all .2s; -webkit-tap-highlight-color: transparent; }
  .zcard:active { transform: scale(.95); }
  .zcard.selected { background: var(--card); border-color: var(--lavender); box-shadow: 0 0 18px rgba(124,58,237,.35); }
  .zcard-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
  .zcard-name { font-size: 10px; color: var(--muted); letter-spacing: .03em; }
  .zcard-date { font-size: 8.5px; color: rgba(139,127,170,.6); margin-top: 2px; }
  .zcard.selected .zcard-name { color: var(--lavender); }
  .fortune-wrap { padding: 24px 16px 48px; max-width: 420px; margin: 0 auto; display: none; }
  .fortune-wrap.visible { display: block; animation: fadeUp .5s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .fortune-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px 22px 24px; position: relative; overflow: hidden; }
  .fortune-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(124,58,237,.18), transparent 70%); pointer-events: none; }
  .fortune-header { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
  .fortune-emoji { font-size: 38px; }
  .fortune-name { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; color: var(--gold); }
  .fortune-period { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .overall { background: rgba(124,58,237,.12); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; font-family: 'Noto Serif KR', serif; font-size: 15px; line-height: 1.8; color: var(--text); border-left: 3px solid var(--lavender); }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .stat { background: var(--surface); border-radius: 12px; padding: 12px 8px; text-align: center; }
  .stat-icon { font-size: 18px; margin-bottom: 4px; }
  .stat-label { font-size: 9px; color: var(--muted); letter-spacing: .1em; margin-bottom: 6px; }
  .stars-row { display: flex; justify-content: center; gap: 2px; }
  .star { font-size: 11px; opacity: .3; }
  .star.on { opacity: 1; }
  .detail-title { font-size: 10px; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .detail-row { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13px; line-height: 1.7; color: var(--text); }
  .detail-dot { flex-shrink: 0; width: 5px; height: 5px; border-radius: 50%; background: var(--lavender); margin-top: 8px; }
  .lucky-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
  .lucky-pill { background: rgba(196,164,255,.1); border: 1px solid rgba(196,164,255,.25); border-radius: 20px; padding: 5px 12px; font-size: 11px; color: var(--lavender); }
  .lucky-pill span { color: var(--muted); margin-right: 4px; }
  .footer-msg { text-align: center; font-size: 11px; color: var(--muted); margin-top: 20px; line-height: 1.8; }
  .footer-msg em { font-style: normal; color: var(--accent); }
  .prompt { text-align: center; padding: 10px 0 32px; color: var(--muted); font-size: 13px; animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: .5; } 50% { opacity: 1; } }
</style>
</head>

  <p class="lock-desc">이 운세는 <em>전용 NFC 스티커</em>로만 열 수 있어요.<br>스티커에 핸드폰을 살짝 대어주세요 ✦</p>

</div>
<script>
(function(){
  function h(s){let x=2166136261;for(let i=0;i<s.length;i++){x^=s.charCodeAt(i);x=Math.imul(x,16777619);}return x>>>0;}
  const KEY_HASH = 427729475;
  const key = new URLSearchParams(location.search).get('key') || '';
  if(h(String(h(key))) !== KEY_HASH) {
    document.addEventListener('DOMContentLoaded', function(){
      document.getElementById('lock-screen').classList.add('active');
      document.querySelector('.page').style.display = 'none';
    });
  }
})();
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey) && ['s','u','p'].includes(e.key.toLowerCase())) e.preventDefault();
  if(e.key === 'F12') e.preventDefault();
});
</script>

<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W, H, starsArr = [];
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  starsArr = Array.from({length:130}, () => ({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.4+.3, a:Math.random(), da:(Math.random()-.5)*.008 }));
}
resize(); window.addEventListener('resize', resize);
function drawStars() {
  ctx.clearRect(0,0,W,H);
  starsArr.forEach(s => {
    s.a = Math.max(.1, Math.min(1, s.a + s.da));
    if(s.a<=.1||s.a>=1) s.da*=-1;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(210,190,255,${s.a})`; ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

function hash(str) {
  let h = 2166136261;
  for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}
  return h>>>0;
}
function seededRand(seed, max) { return hash(String(seed)) % max; }
function getTodayStr() {
  const d=new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function getFortune(zodiacId) {
  const dateStr=getTodayStr();
  const seed=`${zodiacId}-${dateStr}`;
  const overallArr=OVERALL[zodiacId];
  const detailArr=DETAILS[zodiacId];
  const overallIdx=seededRand(seed+'ov',overallArr.length);
  const detailIdx=seededRand(seed+'dt',detailArr.length);
  const love=seededRand(seed+'lv',5)+1;
  const money=seededRand(seed+'mn',5)+1;
  const health=seededRand(seed+'hl',5)+1;
  const color=LUCKY.colors[seededRand(seed+'cl',LUCKY.colors.length)];
  const number=LUCKY.numbers[seededRand(seed+'nm',LUCKY.numbers.length)];
  const item=LUCKY.items[seededRand(seed+'it',LUCKY.items.length)];
  const time=LUCKY.times[seededRand(seed+'tm',LUCKY.times.length)];
  return {overall:overallArr[overallIdx],details:detailArr[detailIdx],love,money,health,color,number,item,time};
}

const todayEl=document.getElementById('today-date');
const now=new Date();
const weekdays=['일','월','화','수','목','금','토'];
todayEl.textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${weekdays[now.getDay()]})`;

const grid=document.getElementById('zodiac-grid');
ZODIACS.forEach(z=>{
  const div=document.createElement('div');
  div.className='zcard';
  div.dataset.id=z.id;
  div.innerHTML=`<span class="zcard-emoji">${z.emoji}</span><span class="zcard-name">${z.name}</span><span class="zcard-date">${z.period}</span>`;
  div.addEventListener('click',()=>selectZodiac(z));
  grid.appendChild(div);
});

function starsHtml(n){return Array.from({length:5},(_,i)=>`<span class="star${i<n?' on':''}">${i<n?'★':'★'}</span>`).join('');}

function selectZodiac(z){
  document.querySelectorAll('.zcard').forEach(c=>c.classList.remove('selected'));
  document.querySelector(`.zcard[data-id="${z.id}"]`).classList.add('selected');
  document.getElementById('prompt').style.display='none';
  const f=getFortune(z.id);
  document.getElementById('f-emoji').textContent=z.emoji;
  document.getElementById('f-name').textContent=z.name;
  document.getElementById('f-period').textContent=z.period;
  document.getElementById('f-overall').textContent=f.overall;
  document.getElementById('f-stats').innerHTML=`
    <div class="stat"><div class="stat-icon">💕</div><div class="stat-label">사랑</div><div class="stars-row">${starsHtml(f.love)}</div></div>
    <div class="stat"><div class="stat-icon">💰</div><div class="stat-label">금전</div><div class="stars-row">${starsHtml(f.money)}</div></div>
    <div class="stat"><div class="stat-icon">🌿</div><div class="stat-label">건강</div><div class="stars-row">${starsHtml(f.health)}</div></div>
  `;
  document.getElementById('f-details').innerHTML=f.details.map(d=>`<div class="detail-row"><div class="detail-dot"></div><div>${d}</div></div>`).join('');
  document.getElementById('f-lucky').innerHTML=`
    <div class="lucky-pill"><span>🎨</span>${f.color}</div>
    <div class="lucky-pill"><span>🔢</span>${f.number}</div>
    <div class="lucky-pill"><span>🍀</span>${f.item}</div>
    <div class="lucky-pill"><span>⏰</span>${f.time}</div>
  `;
  document.getElementById('f-footer').innerHTML=`오늘 하루도 별빛처럼 빛나세요 ✨<br><em>내일 다시 눌러보면 새로운 운세가 기다립니다</em>`;
  const wrap=document.getElementById('fortune-wrap');
  wrap.classList.remove('visible');
  void wrap.offsetWidth;
  wrap.classList.add('visible');
  setTimeout(()=>{wrap.scrollIntoView({behavior:'smooth',block:'start'});},100);
}
</script>
